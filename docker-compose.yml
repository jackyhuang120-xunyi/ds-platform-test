version: '3.8'

services:
  # 1. 数据库服务
  db:
    image: mysql:8.0
    container_name: ds-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: pass2004
      MYSQL_DATABASE: ds_data_test1
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. 后端服务
  backend:
    build: ./server
    container_name: ds-backend
    restart: always
    depends_on:
      - db
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=pass2004
      - DB_NAME=ds_data_test1
      - JWT_SECRET=ds_platform_secret_key_2026_safe
    ports:
      - "5000:5000"

  # 3. 前端服务
  frontend:
    build: .
    container_name: ds-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  db_data:
